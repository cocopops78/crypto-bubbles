<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CryptoBubbles">
  <meta name="description" content="Visualisation des cryptos en temps réel">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>CryptoBubbles</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: rgba(255,255,255,0.06);
      --text: #f0f0f0;
      --muted: #666;
      --green: #00d68f;
      --red: #ff4757;
      --amber: #ffa502;
      --blue: #3a86ff;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Pro Display', -apple-system, 'Segoe UI', sans-serif;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: rgba(10,10,15,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      z-index: 100;
    }

    #header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    #header .subtitle {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .header-left { display: flex; flex-direction: column; gap: 1px; }

    .header-right {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .tab-btn {
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      -webkit-appearance: none;
      letter-spacing: 0.03em;
    }

    .tab-btn.active {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border-color: rgba(255,255,255,0.15);
    }

    #canvas-wrap {
      position: fixed;
      top: 52px; left: 0; right: 0; bottom: 44px;
      overflow: hidden;
    }

    canvas { display: block; }

    #footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 44px;
      background: rgba(10,10,15,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      z-index: 100;
    }

    #footer .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }
    #footer .stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    #footer .stat-val { font-size: 12px; font-weight: 600; }

    #update-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #tooltip {
      position: fixed;
      background: rgba(19,19,26,0.95);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 12px;
      pointer-events: none;
      z-index: 200;
      display: none;
      backdrop-filter: blur(8px);
      min-width: 110px;
    }
    #tooltip .t-name { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
    #tooltip .t-price { color: var(--muted); font-size: 11px; }
    #tooltip .t-change { font-weight: 600; font-size: 13px; margin-top: 2px; }

    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 500;
    }
    #loading .logo { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
    #loading .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading .load-text { font-size: 12px; color: var(--muted); }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading">
  <div class="logo">● Crypto</div>
  <div class="spinner"></div>
  <div class="load-text">Chargement des marchés…</div>
</div>

<div id="header">
  <div class="header-left">
    <h1>● Crypto Bubbles</h1>
    <span class="subtitle">Top 50 — Marché live</span>
  </div>
  <div class="header-right">
    <button class="tab-btn active" data-period="1h">1H</button>
    <button class="tab-btn" data-period="24h">24H</button>
    <button class="tab-btn" data-period="7d">7J</button>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
</div>

<div id="footer">
  <div class="stat">
    <span class="stat-label">Hausses</span>
    <span class="stat-val" id="f-up" style="color:var(--green)">–</span>
  </div>
  <div class="stat">
    <span class="stat-label">Baisses</span>
    <span class="stat-val" id="f-down" style="color:var(--red)">–</span>
  </div>
  <div class="stat">
    <span class="stat-label">BTC Dom.</span>
    <span class="stat-val" id="f-dom">–</span>
  </div>
  <div class="stat">
    <span class="stat-label">Màj</span>
    <div id="update-dot"></div>
  </div>
</div>

<div id="tooltip">
  <div class="t-name" id="tt-name"></div>
  <div class="t-price" id="tt-price"></div>
  <div class="t-change" id="tt-change"></div>
</div>

<script>
const COINS = [
  {id:'bitcoin',sym:'BTC'},{id:'ethereum',sym:'ETH'},{id:'tether',sym:'USDT'},
  {id:'binancecoin',sym:'BNB'},{id:'solana',sym:'SOL'},{id:'ripple',sym:'XRP'},
  {id:'usd-coin',sym:'USDC'},{id:'staked-ether',sym:'STETH'},{id:'dogecoin',sym:'DOGE'},
  {id:'cardano',sym:'ADA'},{id:'tron',sym:'TRX'},{id:'avalanche-2',sym:'AVAX'},
  {id:'wrapped-bitcoin',sym:'WBTC'},{id:'shiba-inu',sym:'SHIB'},{id:'polkadot',sym:'DOT'},
  {id:'chainlink',sym:'LINK'},{id:'polygon',sym:'MATIC'},{id:'litecoin',sym:'LTC'},
  {id:'uniswap',sym:'UNI'},{id:'bitcoin-cash',sym:'BCH'},{id:'stellar',sym:'XLM'},
  {id:'internet-computer',sym:'ICP'},{id:'ethereum-classic',sym:'ETC'},{id:'filecoin',sym:'FIL'},
  {id:'hedera-hashgraph',sym:'HBAR'},{id:'near',sym:'NEAR'},{id:'aptos',sym:'APT'},
  {id:'arbitrum',sym:'ARB'},{id:'vechain',sym:'VET'},{id:'the-open-network',sym:'TON'},
  {id:'algorand',sym:'ALGO'},{id:'injective-protocol',sym:'INJ'},{id:'sei-network',sym:'SEI'},
  {id:'monero',sym:'XMR'},{id:'lido-dao',sym:'LDO'},{id:'the-graph',sym:'GRT'},
  {id:'render-token',sym:'RNDR'},{id:'aave',sym:'AAVE'},{id:'cosmos',sym:'ATOM'},
  {id:'sui',sym:'SUI'},{id:'flow',sym:'FLOW'},{id:'maker',sym:'MKR'},
  {id:'theta-token',sym:'THETA'},{id:'quant-network',sym:'QNT'},{id:'fetch-ai',sym:'FET'},
  {id:'elrond-erd-2',sym:'EGLD'},{id:'axie-infinity',sym:'AXS'},{id:'decentraland',sym:'MANA'},
  {id:'eos',sym:'EOS'},{id:'conflux-token',sym:'CFX'}
];

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');
const tooltip = document.getElementById('tooltip');

let W, H, bubbles = [], period = '24h', dragging = false, lastTouch = null;
let offsetX = 0, offsetY = 0, velX = 0, velY = 0;
let animFrame;
let marketData = {};
let physBubbles = [];

function resize() {
  const r = wrap.getBoundingClientRect();
  W = canvas.width = r.width;
  H = canvas.height = r.height;
  if (physBubbles.length) layoutBubbles();
}

function getColor(pct) {
  if (!pct || isNaN(pct)) return ['rgba(80,80,100,0.35)', 'rgba(120,120,140,0.7)'];
  const abs = Math.abs(pct);
  if (pct > 0) {
    const a = Math.min(0.85, 0.2 + abs * 0.05);
    const g = Math.min(214, 80 + abs * 13);
    return [`rgba(0,${g},100,${a})`, '#00d68f'];
  } else {
    const a = Math.min(0.85, 0.2 + abs * 0.05);
    const r = Math.min(255, 180 + abs * 7);
    return [`rgba(${r},40,60,${a})`, '#ff4757'];
  }
}

function getRadius(mcap, maxMcap) {
  const minR = 18, maxR = Math.min(W, H) * 0.18;
  const norm = Math.pow(mcap / maxMcap, 0.45);
  return minR + norm * (maxR - minR);
}

function layoutBubbles() {
  const data = physBubbles;
  if (!data.length) return;
  const maxMcap = Math.max(...data.map(d => d.mcap || 1));
  const area = W * H;
  const totalArea = data.reduce((s, d) => {
    const r = getRadius(d.mcap || 1, maxMcap);
    return s + Math.PI * r * r;
  }, 0);
  const scale = Math.sqrt((area * 0.72) / totalArea);

  bubbles = data.map((d, i) => {
    const r = getRadius(d.mcap || 1, maxMcap) * scale;
    const pct = d[period] || 0;
    const [fill, textColor] = getColor(pct);
    return {
      id: d.id, sym: d.sym, r,
      x: Math.random() * (W - 2 * r) + r,
      y: Math.random() * (H - 2 * r) + r,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      fill, textColor, pct,
      price: d.price,
      mcap: d.mcap
    };
  });
  separateBubbles();
}

function separateBubbles() {
  for (let iter = 0; iter < 60; iter++) {
    for (let i = 0; i < bubbles.length; i++) {
      for (let j = i + 1; j < bubbles.length; j++) {
        const a = bubbles[i], b = bubbles[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = a.r + b.r + 3;
        if (dist < minDist && dist > 0.01) {
          const overlap = (minDist - dist) / 2;
          const nx = dx / dist, ny = dy / dist;
          a.x -= nx * overlap; a.y -= ny * overlap;
          b.x += nx * overlap; b.y += ny * overlap;
        }
      }
      const b = bubbles[i];
      b.x = Math.max(b.r, Math.min(W - b.r, b.x));
      b.y = Math.max(b.r, Math.min(H - b.r, b.y));
    }
  }
}

function drawBubble(b) {
  ctx.save();
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  ctx.fillStyle = b.fill;
  ctx.fill();
  ctx.strokeStyle = b.textColor + '55';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.fillStyle = b.textColor;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const sym = b.sym;
  const pctStr = (b.pct > 0 ? '+' : '') + b.pct.toFixed(1) + '%';

  if (b.r > 28) {
    ctx.font = `600 ${Math.min(b.r * 0.34, 14)}px -apple-system, sans-serif`;
    ctx.fillText(sym, b.x, b.y - b.r * 0.14);
    ctx.font = `500 ${Math.min(b.r * 0.26, 11)}px -apple-system, sans-serif`;
    ctx.fillStyle = b.textColor + 'cc';
    ctx.fillText(pctStr, b.x, b.y + b.r * 0.22);
  } else if (b.r > 16) {
    ctx.font = `600 ${Math.min(b.r * 0.38, 11)}px -apple-system, sans-serif`;
    ctx.fillText(sym, b.x, b.y);
  } else {
    ctx.font = `600 ${Math.min(b.r * 0.5, 9)}px -apple-system, sans-serif`;
    ctx.fillText(sym, b.x, b.y);
  }

  ctx.restore();
}

function physicsStep() {
  bubbles.forEach(b => {
    b.vx *= 0.98; b.vy *= 0.98;
    b.x += b.vx; b.y += b.vy;
    if (b.x - b.r < 0) { b.x = b.r; b.vx = Math.abs(b.vx); }
    if (b.x + b.r > W) { b.x = W - b.r; b.vx = -Math.abs(b.vx); }
    if (b.y - b.r < 0) { b.y = b.r; b.vy = Math.abs(b.vy); }
    if (b.y + b.r > H) { b.y = H - b.r; b.vy = -Math.abs(b.vy); }
  });
  for (let i = 0; i < bubbles.length; i++) {
    for (let j = i + 1; j < bubbles.length; j++) {
      const a = bubbles[i], b = bubbles[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minDist = a.r + b.r + 2;
      if (dist < minDist && dist > 0.01) {
        const overlap = (minDist - dist) * 0.5;
        const nx = dx / dist, ny = dy / dist;
        a.x -= nx * overlap * 0.5; a.y -= ny * overlap * 0.5;
        b.x += nx * overlap * 0.5; b.y += ny * overlap * 0.5;
      }
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  physicsStep();
  bubbles.forEach(drawBubble);
  animFrame = requestAnimationFrame(draw);
}

function formatPrice(p) {
  if (!p) return '–';
  if (p >= 1000) return '$' + p.toLocaleString('fr-FR', {maximumFractionDigits: 0});
  if (p >= 1) return '$' + p.toFixed(2);
  if (p >= 0.01) return '$' + p.toFixed(4);
  return '$' + p.toFixed(6);
}

function getTouchPos(e) {
  const t = e.changedTouches ? e.changedTouches[0] : e;
  const rect = canvas.getBoundingClientRect();
  return { x: t.clientX - rect.left, y: t.clientY - rect.top };
}

function hitTest(x, y) {
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    const dx = x - b.x, dy = y - b.y;
    if (dx * dx + dy * dy < b.r * b.r) return b;
  }
  return null;
}

let touchStart = null, touchMoved = false;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const pos = getTouchPos(e);
  touchStart = pos;
  touchMoved = false;
  const hit = hitTest(pos.x, pos.y);
  if (hit) {
    hit.vx = (Math.random() - 0.5) * 2;
    hit.vy = (Math.random() - 0.5) * 2;
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchStart) return;
  const pos = getTouchPos(e);
  const dx = pos.x - touchStart.x, dy = pos.y - touchStart.y;
  if (Math.abs(dx) > 4 || Math.abs(dy) > 4) touchMoved = true;
  if (touchMoved) {
    bubbles.forEach(b => { b.x += dx * 0.3; b.y += dy * 0.3; });
    touchStart = pos;
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!touchMoved) {
    const pos = getTouchPos(e);
    const hit = hitTest(pos.x, pos.y);
    if (hit) showTooltip(hit, pos.x, pos.y);
    else hideTooltip();
  }
  touchStart = null;
}, { passive: false });

function showTooltip(b, x, y) {
  document.getElementById('tt-name').textContent = b.sym;
  document.getElementById('tt-price').textContent = formatPrice(b.price);
  const pct = b.pct;
  const el = document.getElementById('tt-change');
  el.textContent = (pct > 0 ? '▲ +' : '▼ ') + pct.toFixed(2) + '%';
  el.style.color = pct >= 0 ? 'var(--green)' : 'var(--red)';
  tooltip.style.display = 'block';
  const tw = 130, th = 70;
  let tx = x + 12, ty = y - th / 2;
  if (tx + tw > W) tx = x - tw - 12;
  if (ty < 0) ty = 4;
  if (ty + th > H) ty = H - th - 4;
  tooltip.style.left = tx + 'px';
  tooltip.style.top = (ty + 52) + 'px';
  setTimeout(hideTooltip, 2200);
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

function updateFooter(data) {
  const ups = data.filter(d => (d[period] || 0) > 0).length;
  const downs = data.filter(d => (d[period] || 0) < 0).length;
  document.getElementById('f-up').textContent = ups;
  document.getElementById('f-down').textContent = downs;
  const btc = data.find(d => d.id === 'bitcoin');
  const total = data.reduce((s, d) => s + (d.mcap || 0), 0);
  if (btc && total) {
    document.getElementById('f-dom').textContent = ((btc.mcap / total) * 100).toFixed(1) + '%';
  }
}

async function fetchData() {
  try {
    const ids = COINS.map(c => c.id).join(',');
    const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=50&page=1&price_change_percentage=1h,24h,7d`;
    const res = await fetch(url);
    const json = await res.json();

    physBubbles = json.map(d => {
      const coin = COINS.find(c => c.id === d.id) || {};
      return {
        id: d.id,
        sym: d.symbol.toUpperCase(),
        price: d.current_price,
        mcap: d.market_cap || 1,
        '1h': d.price_change_percentage_1h_in_currency || 0,
        '24h': d.price_change_percentage_24h_in_currency || 0,
        '7d': d.price_change_percentage_7d_in_currency || 0
      };
    });

    marketData = {};
    physBubbles.forEach(d => { marketData[d.id] = d; });
    layoutBubbles();
    updateFooter(physBubbles);
    document.getElementById('loading').style.display = 'none';
    if (!animFrame) draw();
  } catch (err) {
    console.warn('API error:', err);
    useFallbackData();
  }
}

function useFallbackData() {
  physBubbles = COINS.slice(0, 30).map((c, i) => ({
    id: c.id, sym: c.sym,
    price: Math.random() * 50000,
    mcap: Math.pow(0.7, i) * 1e12,
    '1h': (Math.random() - 0.48) * 6,
    '24h': (Math.random() - 0.48) * 15,
    '7d': (Math.random() - 0.48) * 30
  }));
  layoutBubbles();
  updateFooter(physBubbles);
  document.getElementById('loading').style.display = 'none';
  document.querySelector('#header .subtitle').textContent = 'Mode démo — Données simulées';
  if (!animFrame) draw();
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    period = btn.dataset.period;
    if (physBubbles.length) {
      bubbles.forEach(b => {
        const d = physBubbles.find(p => p.id === b.id);
        if (d) {
          const pct = d[period] || 0;
          const [fill, textColor] = getColor(pct);
          b.fill = fill; b.textColor = textColor; b.pct = pct;
        }
      });
      updateFooter(physBubbles);
    }
  });
});

window.addEventListener('resize', resize);
resize();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

fetchData();
setInterval(fetchData, 60000);
</script>
</body>
</html>
