<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#090b0e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CryptoBubbles">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Crypto Bubbles</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  width:100%;height:100%;
  background:#090b0e;
  overflow:hidden;
  touch-action:none;
  user-select:none;
  font-family:'Courier New',Courier,monospace;
  color:#eee;
}

/* ── HEADER ─────────────────────────────────── */
#hdr{
  position:fixed;top:0;left:0;right:0;height:42px;z-index:300;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  background:#090b0e;
}
.hbrand{display:flex;align-items:center;gap:7px}
.hbullet{
  width:9px;height:9px;border-radius:50%;
  background:#00e5a0;
  box-shadow:0 0 10px #00e5a066;
  flex-shrink:0;
}
.hbullet.live{animation:blink 2.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 10px #00e5a066}50%{opacity:.4;box-shadow:none}}
.hname{font-size:13px;font-weight:700;letter-spacing:.01em;color:#ddd}
.hsub{font-size:9px;color:#3a4a40;letter-spacing:.08em;text-transform:uppercase;margin-top:1px}

.tabs{display:flex;gap:3px}
.tab{
  font-family:inherit;font-size:11px;font-weight:600;
  padding:4px 11px;border-radius:3px;
  border:1px solid #1e2a24;
  background:transparent;color:#3a5a48;cursor:pointer;
  letter-spacing:.06em;transition:all .15s;
}
.tab.on{
  background:#0d2b1e;color:#00e5a0;
  border-color:#00e5a044;
  box-shadow:0 0 8px #00e5a01a;
}

/* ── CANVAS AREA ────────────────────────────── */
#wrap{
  position:fixed;top:42px;left:0;right:0;bottom:38px;
  overflow:hidden;
}
svg{width:100%;height:100%;display:block}

/* ── BUBBLE STYLES ──────────────────────────── */
/* green bubbles */
.b-green .bcircle{
  stroke-width:1px;
  fill-rule:evenodd;
}
/* Radial gradient via SVG defs */

/* ── TOOLTIP ────────────────────────────────── */
#tip{
  position:fixed;z-index:500;
  background:#0d1410;
  border:1px solid #1e3a28;
  border-radius:6px;padding:10px 14px;
  display:none;pointer-events:none;
  min-width:140px;
}
.tname{font-size:15px;font-weight:700;color:#00e5a0;margin-bottom:1px;letter-spacing:.02em}
.tprice{font-size:10px;color:#3a6a50;margin-bottom:6px}
.tsep{height:1px;background:#1a2e22;margin:5px 0}
.trow{display:flex;justify-content:space-between;gap:14px;font-size:10px;padding:1px 0}
.trow .tl{color:#3a5a48}
.tpct{font-size:18px;font-weight:700;margin-top:4px}

/* ── FOOTER ─────────────────────────────────── */
#ftr{
  position:fixed;bottom:0;left:0;right:0;height:38px;z-index:300;
  display:flex;align-items:center;justify-content:space-around;
  border-top:1px solid rgba(255,255,255,0.05);
  background:#090b0e;
  padding:0 10px;
}
.fs{display:flex;flex-direction:column;align-items:center;gap:0px}
.fl{font-size:8px;color:#2a3a30;text-transform:uppercase;letter-spacing:.1em}
.fv{font-size:12px;font-weight:700;letter-spacing:.02em}
.fv.up{color:#00e5a0}.fv.dn{color:#ff3d57}.fv.n{color:#4a5a50}

/* ── LOADER ─────────────────────────────────── */
#ldr{
  position:fixed;inset:0;background:#090b0e;z-index:1000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  transition:opacity .4s;
}
.lring{
  width:32px;height:32px;border-radius:50%;
  border:2px solid #0d2b1e;border-top-color:#00e5a0;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:10px;color:#2a4a38;letter-spacing:.15em;text-transform:uppercase}
.llogo{font-size:22px;font-weight:700;color:#00e5a0;letter-spacing:-.01em}
.llogo span{color:#3a5a48}
</style>
</head>
<body>

<div id="ldr">
  <div class="llogo">Crypto<span>Bubbles</span></div>
  <div class="lring"></div>
  <div class="ltxt">Chargement des marchés…</div>
</div>

<div id="hdr">
  <div class="hbrand">
    <div class="hbullet live"></div>
    <div>
      <div class="hname">● Crypto Bubbles</div>
      <div class="hsub" id="hsub">Top 50 — Marché live</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" data-p="1h">1H</button>
    <button class="tab" data-p="24h">24H</button>
    <button class="tab" data-p="7d">7J</button>
  </div>
</div>

<div id="wrap"><svg id="svg"><defs id="defs"></defs></svg></div>

<div id="ftr">
  <div class="fs"><span class="fl">Hausses</span><span class="fv up" id="f-up">–</span></div>
  <div class="fs"><span class="fl">Baisses</span><span class="fv dn" id="f-dn">–</span></div>
  <div class="fs"><span class="fl">BTC Dom.</span><span class="fv n" id="f-dom">–</span></div>
  <div class="fs"><span class="fl">Vol. 24h</span><span class="fv n" id="f-vol">–</span></div>
</div>

<div id="tip">
  <div class="tname" id="t-sym"></div>
  <div class="tprice" id="t-price"></div>
  <div class="tpct" id="t-pct"></div>
  <div class="tsep"></div>
  <div class="trow"><span class="tl">1H</span><span id="t-1h"></span></div>
  <div class="trow"><span class="tl">24H</span><span id="t-24h"></span></div>
  <div class="trow"><span class="tl">7J</span><span id="t-7d"></span></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
const COIN_IDS = [
  'bitcoin','ethereum','tether','binancecoin','solana','ripple',
  'usd-coin','staked-ether','dogecoin','cardano','tron','avalanche-2',
  'shiba-inu','polkadot','chainlink','polygon','litecoin','uniswap',
  'bitcoin-cash','stellar','internet-computer','ethereum-classic','filecoin',
  'hedera-hashgraph','near','aptos','arbitrum','vechain','the-open-network',
  'algorand','injective-protocol','sei-network','monero','lido-dao',
  'the-graph','render-token','aave','cosmos','sui','flow','maker',
  'theta-token','quant-network','fetch-ai','elrond-erd-2','axie-infinity',
  'decentraland','eos','conflux-token','wrapped-bitcoin'
];

// ── STATE ──────────────────────────────────────────────────────────────────
let period = '1h';
let allData = [];
let sim;
let W, H;
let tipTimer;

// ── UTILS ──────────────────────────────────────────────────────────────────
const svg  = d3.select('#svg');
const defs = d3.select('#defs');
const wrap = document.getElementById('wrap');

function dims(){
  const r = wrap.getBoundingClientRect();
  W = r.width; H = r.height;
}

function fmtPct(v){
  if(v==null||isNaN(v)) return '–';
  return (v>0?'+':'')+v.toFixed(2)+'%';
}
function fmtPrice(p){
  if(!p||isNaN(p)) return '–';
  if(p>=10000) return '$'+p.toLocaleString('en-US',{maximumFractionDigits:0});
  if(p>=1)     return '$'+p.toFixed(2);
  if(p>=0.001) return '$'+p.toFixed(4);
  return '$'+p.toFixed(6);
}
function fmtVol(v){
  if(!v) return '–';
  if(v>=1e12) return '$'+(v/1e12).toFixed(1)+'T';
  if(v>=1e9)  return '$'+(v/1e9).toFixed(1)+'B';
  if(v>=1e6)  return '$'+(v/1e6).toFixed(0)+'M';
  return '$'+v.toFixed(0);
}

// ── COLORS — exactly matching the reference screenshot ─────────────────────
//  Green: dark teal fill, bright teal text
//  Red:   dark crimson fill, bright crimson text
//  Neutral (≈0): very dark, muted
function bubbleStyle(pct){
  if(pct==null||isNaN(pct)){
    return { fill:'#101a14', stroke:'#1a2a1e', text:'#2a4a38', dim:true };
  }
  const a = Math.abs(pct);

  if(pct >= 0){
    // 0→10%+ scale
    const t = Math.min(1, a / 8);
    // fill: very dark teal → slightly less dark teal
    const fill = lerpColor([8,26,18], [10,44,30], t);
    // stroke: subtle green glow
    const stroke = `rgba(0,${180+Math.round(t*75)},${120+Math.round(t*40)},${0.25+t*0.45})`;
    // text: bright teal, gets more vivid with bigger move
    const tr = Math.round(0);
    const tg = Math.round(180+t*75);
    const tb = Math.round(130+t*30);
    return { fill, stroke, text:`rgb(${tr},${tg},${tb})` };
  } else {
    const t = Math.min(1, a / 8);
    const fill = lerpColor([26,8,12], [48,10,16], t);
    const stroke = `rgba(${180+Math.round(t*75)},${30},${50},${0.25+t*0.45})`;
    const tr = Math.round(180+t*75);
    const tg = Math.round(40-t*20);
    const tb = Math.round(55-t*25);
    return { fill, stroke, text:`rgb(${tr},${tg},${tb})` };
  }
}

function lerpColor(a,b,t){
  const r=Math.round(a[0]+(b[0]-a[0])*t);
  const g=Math.round(a[1]+(b[1]-a[1])*t);
  const bl=Math.round(a[2]+(b[2]-a[2])*t);
  return `rgb(${r},${g},${bl})`;
}

// ── RADIUS CALCULATION ─────────────────────────────────────────────────────
// Pack bubbles so they fill ~92% of the canvas area (like the original)
function assignRadii(data){
  const maxM = d3.max(data, d=>d.mcap);
  const minR = Math.min(W,H)*0.025;
  const maxR = Math.min(W,H)*0.28;

  // raw radii proportional to sqrt(mcap)
  data.forEach(d=>{
    const norm = Math.sqrt(d.mcap/maxM);
    d.r = minR + norm*(maxR-minR);
  });

  // Scale so sum of areas ≈ 88% of canvas
  const totalArea = data.reduce((s,d)=>s+Math.PI*d.r*d.r,0);
  const target    = W*H*0.88;
  const scale     = Math.sqrt(target/totalArea);
  data.forEach(d=>{ d.r = Math.max(12, d.r*scale); });
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(data, keepPositions=false){
  dims();
  assignRadii(data);

  // init positions: keep old ones if we have them, else scatter near center
  data.forEach(d=>{
    if(!keepPositions || d.x==null){
      // spread out from center proportional to inverse of size
      const angle = Math.random()*Math.PI*2;
      const spread = Math.random()*Math.min(W,H)*0.25;
      d.x = W/2 + Math.cos(angle)*spread;
      d.y = H/2 + Math.sin(angle)*spread;
    }
    d.vx=0; d.vy=0;
  });

  // Stop old sim
  if(sim) sim.stop();

  // SVG layers
  svg.selectAll('g.blayer').remove();
  const layer = svg.append('g').attr('class','blayer');

  const node = layer.selectAll('g.bnode')
    .data(data, d=>d.id)
    .join(
      enter => {
        const g = enter.append('g').attr('class','bnode')
          .style('cursor','pointer');

        g.append('circle').attr('class','bcircle');
        g.append('text').attr('class','bsym');
        g.append('text').attr('class','bpct');

        g.on('click touchend', function(ev,d){
          ev.preventDefault(); ev.stopPropagation();
          showTip(d, ev);
        });
        return g;
      }
    );

  // style all nodes
  styleNodes(node, data);

  // Simulation — tight packing with strong collision
  sim = d3.forceSimulation(data)
    .force('collide', d3.forceCollide(d=>d.r+0.8).strength(1).iterations(6))
    .force('x', d3.forceX(W/2).strength(0.055))
    .force('y', d3.forceY(H/2).strength(0.055))
    .force('charge', d3.forceManyBody().strength(d=> -d.r*0.4))
    .alphaDecay(0.012)
    .velocityDecay(0.42)
    .on('tick', ()=>{
      // clamp to bounds
      data.forEach(d=>{
        d.x = Math.max(d.r, Math.min(W-d.r, d.x));
        d.y = Math.max(d.r, Math.min(H-d.r, d.y));
      });
      node.attr('transform', d=>`translate(${d.x},${d.y})`);
    });
}

function styleNodes(sel, data){
  sel.each(function(d){
    const st = bubbleStyle(d[period]);
    const g  = d3.select(this);

    g.select('.bcircle')
      .attr('r', d.r)
      .attr('fill', st.fill)
      .attr('stroke', st.stroke)
      .attr('stroke-width', 1);

    // font sizes
    const bigR  = d.r > 36;
    const midR  = d.r > 20;

    g.select('.bsym')
      .attr('text-anchor','middle')
      .attr('dominant-baseline','middle')
      .attr('dy', bigR ? '-0.6em' : midR ? '-0.1em' : '0')
      .attr('fill', st.text)
      .style('font-size', `${Math.min(d.r*0.38, 14)}px`)
      .style('font-weight','700')
      .style('letter-spacing','.02em')
      .text(d.r>12 ? d.sym : '');

    g.select('.bpct')
      .attr('text-anchor','middle')
      .attr('dominant-baseline','middle')
      .attr('dy', bigR ? '0.7em' : '0')
      .attr('fill', st.text)
      .style('font-size', `${Math.min(d.r*0.26, 10)}px`)
      .style('font-weight','500')
      .attr('opacity', bigR?0.9:0)
      .text(fmtPct(d[period]));
  });
}

// ── UPDATE COLORS ONLY (period change) ────────────────────────────────────
function recolor(){
  svg.selectAll('g.bnode').call(function(sel){
    styleNodes(sel, allData);
  });
  updateFooter();
}

// ── TOOLTIP ────────────────────────────────────────────────────────────────
function showTip(d, ev){
  clearTimeout(tipTimer);
  const tip = document.getElementById('tip');

  document.getElementById('t-sym').textContent   = d.sym;
  document.getElementById('t-price').textContent = fmtPrice(d.price);

  const pct   = d[period];
  const pctEl = document.getElementById('t-pct');
  pctEl.textContent  = fmtPct(pct);
  pctEl.style.color  = (!pct||isNaN(pct)) ? '#3a5a48' : pct>=0 ? '#00e5a0' : '#ff3d57';

  const setRow = (id, val)=>{
    const el = document.getElementById(id);
    el.textContent = fmtPct(val);
    el.style.color = (!val||isNaN(val)) ? '#3a5a48' : val>=0 ? '#00e5a0' : '#ff3d57';
  };
  setRow('t-1h',  d['1h']);
  setRow('t-24h', d['24h']);
  setRow('t-7d',  d['7d']);

  tip.style.display = 'block';

  // position
  let cx, cy;
  if(ev.changedTouches?.length){ cx=ev.changedTouches[0].clientX; cy=ev.changedTouches[0].clientY; }
  else if(ev.touches?.length)  { cx=ev.touches[0].clientX;        cy=ev.touches[0].clientY; }
  else                         { cx=ev.clientX;                    cy=ev.clientY; }

  const tw=tip.offsetWidth||155, th=tip.offsetHeight||130;
  let tx=cx+16, ty=cy-th/2;
  if(tx+tw>W-6) tx=cx-tw-16;
  if(ty<46)     ty=46;
  if(ty+th>H-42) ty=H-42-th;
  tip.style.left=tx+'px'; tip.style.top=ty+'px';
  tipTimer = setTimeout(()=>tip.style.display='none', 3500);
}

document.addEventListener('pointerdown', ev=>{
  if(!ev.target.closest('.bnode')&&!ev.target.closest('#tip'))
    document.getElementById('tip').style.display='none';
});

// ── FOOTER ────────────────────────────────────────────────────────────────
function updateFooter(){
  const up  = allData.filter(d=>(d[period]||0)>0).length;
  const dn  = allData.filter(d=>(d[period]||0)<0).length;
  document.getElementById('f-up').textContent = up;
  document.getElementById('f-dn').textContent = dn;
  const btc   = allData.find(d=>d.id==='bitcoin');
  const total = allData.reduce((s,d)=>s+(d.mcap||0),0);
  if(btc&&total) document.getElementById('f-dom').textContent=((btc.mcap/total)*100).toFixed(1)+'%';
  const vol = allData.reduce((s,d)=>s+(d.vol||0),0);
  document.getElementById('f-vol').textContent = fmtVol(vol);
}

// ── PERIOD TABS ───────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    period = btn.dataset.p;
    recolor();
  });
});

// ── DATA FETCH ────────────────────────────────────────────────────────────
async function fetchData(){
  try{
    const ids = COIN_IDS.join(',');
    const url = `https://api.coingecko.com/api/v3/coins/markets`+
      `?vs_currency=usd&ids=${ids}&order=market_cap_desc`+
      `&per_page=50&page=1&price_change_percentage=1h,24h,7d`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();

    const prev={};
    allData.forEach(d=>{ prev[d.id]={x:d.x,y:d.y}; });

    allData = json.map(d=>({
      id:   d.id,
      sym:  d.symbol.toUpperCase(),
      price:d.current_price,
      mcap: d.market_cap||1e6,
      vol:  d.total_volume||0,
      '1h': d.price_change_percentage_1h_in_currency  ??null,
      '24h':d.price_change_percentage_24h_in_currency ??null,
      '7d': d.price_change_percentage_7d_in_currency  ??null,
      x: prev[d.id]?.x,
      y: prev[d.id]?.y,
    }));

    hideLdr();
    render(allData, Object.keys(prev).length>0);
    updateFooter();

  } catch(e){
    console.warn('API fail',e);
    demoData();
  }
}

function demoData(){
  document.getElementById('hsub').textContent='Démo — données simulées';
  const syms=['BTC','ETH','USDT','BNB','SOL','XRP','USDC','STETH','DOGE','ADA',
               'TRX','AVAX','SHIB','DOT','LINK','MATIC','LTC','UNI','BCH','XLM',
               'ICP','ETC','FIL','HBAR','NEAR','APT','ARB','VET','TON','ALGO',
               'INJ','SEI','XMR','LDO','GRT','RNDR','AAVE','ATOM','SUI','FLOW',
               'MKR','THETA','QNT','FET','EGLD','AXS','MANA','EOS','CFX','WBTC'];
  const caps=[1.2e12,4e11,1.1e11,8e10,7e10,6.5e10,5e10,4.8e10,4e10,3.5e10,
              3e10,2.8e10,2.5e10,2.2e10,2e10,1.8e10,1.5e10,1.2e10,1e10,9e9,
              8e9,7.5e9,7e9,6.5e9,6e9,5.5e9,5e9,4.5e9,4e9,3.5e9,
              3e9,2.8e9,2.5e9,2.3e9,2e9,1.8e9,1.7e9,1.5e9,1.4e9,1.3e9,
              1.2e9,1.1e9,1e9,9e8,8e8,7e8,6e8,5e8,4e8,3.5e8];
  const rnd=()=>(Math.random()-.45)*12;
  allData = syms.map((s,i)=>({
    id:s.toLowerCase(),sym:s,
    price:caps[i]/1e6,mcap:caps[i],vol:caps[i]*.04,
    '1h':rnd(),'24h':rnd(),'7d':rnd()*2,
  }));
  hideLdr();
  render(allData,false);
  updateFooter();
}

function hideLdr(){
  const l=document.getElementById('ldr');
  l.style.opacity='0';
  setTimeout(()=>l.style.display='none',400);
}

// ── RESIZE ────────────────────────────────────────────────────────────────
let rzTimer;
window.addEventListener('resize',()=>{
  clearTimeout(rzTimer);
  rzTimer=setTimeout(()=>{ if(allData.length) render(allData,true); },200);
});

// ── INIT ──────────────────────────────────────────────────────────────────
dims();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
fetchData();
setInterval(fetchData, 60000);
</script>
</body>
</html>
